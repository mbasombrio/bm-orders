<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Gestión de Datos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="data-content">

  <p class="section-label">Sincronización</p>

  <div class="actions-card">

    <button class="action-row" (click)="importArticles()" [disabled]="isLoading()">
      <div class="action-icon-wrap action-icon-wrap--articles">
        @if (activeImport() === 'articles') {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon name="cube-outline"></ion-icon>
        }
      </div>
      <div class="action-body">
        <span class="action-title">Importar Artículos</span>
        <span class="action-sub">Actualiza el catálogo local desde el servidor</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="action-chevron"></ion-icon>
    </button>

    <div class="action-divider"></div>

    <button class="action-row" (click)="importClients()" [disabled]="isLoading()">
      <div class="action-icon-wrap action-icon-wrap--clients">
        @if (activeImport() === 'clients') {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon name="people-outline"></ion-icon>
        }
      </div>
      <div class="action-body">
        <span class="action-title">Importar Clientes</span>
        <span class="action-sub">Sincroniza la lista de clientes</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="action-chevron"></ion-icon>
    </button>

    <div class="action-divider"></div>

    <button class="action-row" (click)="importBranches()" [disabled]="isLoading()">
      <div class="action-icon-wrap action-icon-wrap--branches">
        @if (activeImport() === 'branches') {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon name="business-outline"></ion-icon>
        }
      </div>
      <div class="action-body">
        <span class="action-title">Importar Sucursales</span>
        <span class="action-sub">Actualiza las sucursales del usuario</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="action-chevron"></ion-icon>
    </button>

  </div>

  @if (isLoading()) {
    <div class="loading-state">
      <ion-progress-bar type="indeterminate"></ion-progress-bar>
      <p class="loading-text">
        <ion-icon name="information-circle-outline"></ion-icon>
        {{ loadingMessage() }}
      </p>
    </div>
  }

</ion-content>
