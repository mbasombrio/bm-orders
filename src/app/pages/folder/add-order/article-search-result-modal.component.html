<ion-header>
  <ion-toolbar>
    <ion-title>Seleccionar Artículo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismissModal()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item #articleItem *ngFor="let article of articles; let i = index"
      (click)="selectArticle(article)"
      [class.selected]="i === selectedIndex">
      <ion-label>
        <h2>{{ article.name }}</h2>
        <p>SKU: {{ article.sku }}</p>
      </ion-label>
      <ion-label slot="end">
        <p>{{ getPrice(article) | currency }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
