@if (showUpdateBanner()) {
  <div class="update-banner">
    <ion-icon name="cloud-download-outline"></ion-icon>
    <span>Nueva versión disponible</span>
    <button (click)="activateUpdate()">Actualizar ahora</button>
  </div>
}

<ion-app>
  <ion-menu content-id="main-content" [disabled]="isLoginPage" class="app-menu">

    <ion-header>
      <ion-toolbar class="menu-toolbar">
        <div class="menu-brand">
          <div class="brand-dot"></div>
          <span class="brand-name">BM Orders</span>
        </div>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">

      <!-- Profile -->
      @if (userName) {
        <div class="menu-profile">
          <div class="profile-avatar">{{ userInitials }}</div>
          <div class="profile-info">
            <div class="profile-name">{{ userName }}</div>
            <div class="profile-role">Vendedor</div>
          </div>
        </div>
      }

      <!-- Nav -->
      <p class="menu-section-label">Navegación</p>
      <nav class="menu-nav">
        @for (p of appPages; track p.url) {
          <ion-menu-toggle auto-hide="false">
            <a class="nav-item" [routerLink]="p.url" routerLinkActive="nav-item--active">
              <span class="nav-icon-wrap">
                <ion-icon [name]="p.icon"></ion-icon>
              </span>
              <span class="nav-label">{{ p.title }}</span>
            </a>
          </ion-menu-toggle>
        }
      </nav>

      <!-- Footer -->
      <div class="menu-footer">
        @if (canInstall()) {
          <ion-menu-toggle auto-hide="false">
            <button class="footer-item" (click)="installApp()">
              <span class="nav-icon-wrap">
                <ion-icon name="cloud-download-outline"></ion-icon>
              </span>
              <span>Instalar App</span>
            </button>
          </ion-menu-toggle>
        }
        <div class="footer-separator"></div>
        <ion-menu-toggle auto-hide="false">
          <button class="footer-item footer-item--logout" (click)="logout()">
            <span class="nav-icon-wrap nav-icon-wrap--danger">
              <ion-icon name="log-out-outline"></ion-icon>
            </span>
            <span>Cerrar Sesión</span>
          </button>
        </ion-menu-toggle>
      </div>

    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
